name: Update Skill Graph

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "bin/nexus"

jobs:
  graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate skills
        run: node bin/nexus validate

      - name: Generate skill graph
        run: node bin/nexus graph

      - name: Commit graph if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/skill-graph.md
          git diff --staged --quiet || git commit -m "chore: regenerate skill graph [skip ci]"
          git push
